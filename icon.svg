<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="#1a1a2e"/>

  <!-- Left loop (goes under at crossing) -->
  <path d="M 22,64 C 22,28 48,28 64,64 C 48,100 22,100 22,64"
        fill="none" stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Right loop (goes over at crossing) -->
  <path d="M 64,64 C 80,28 106,28 106,64 C 106,100 80,100 64,64"
        fill="none" stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Play button in right loop -->
  <polygon points="80,50 80,78 100,64" fill="#FF6D00"/>
</svg>
